[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    # NOTE: style-src/font-src must allow Google Fonts — the pages <link> Fraunces
    # + Spline Sans from fonts.googleapis.com (CSS) / fonts.gstatic.com (woff2).
    # With the prior 'self'-only policy the browser blocked both and silently fell
    # back to Georgia/system-ui, so the live site never rendered in its design fonts.
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; connect-src 'self' https://formspree.io; img-src 'self' data:; font-src 'self' https://fonts.gstatic.com"

# Serve the real, always-current installer at the branded URL the homepage
# advertises (`curl -fsSL https://dashdiag.sh/install.sh | sh`). MUST come before
# the catch-all below, or the SPA rule serves index.html for /install.sh and the
# one-liner pipes HTML into sh. status=200 = proxy (URL stays dashdiag.sh).
[[redirects]]
  from = "/install.sh"
  to = "https://raw.githubusercontent.com/keyorixhq/dashdiag/main/install.sh"
  status = 200
  force = true

# Clean URL for the Pro plans page (the "See Pro plans" CTA links to /plans).
# Must precede the catch-all, else the SPA rule serves index.html for /plans.
[[redirects]]
  from = "/plans"
  to = "/plans.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
